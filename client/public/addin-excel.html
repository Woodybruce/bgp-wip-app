<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>ChatBGP for Excel</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: #ffffff; color: #111111;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased; }
    button { font-family: inherit; }
    input { font-family: inherit; }
    a { color: inherit; text-decoration: none; }

    /* Login */
    #login { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    #login .box { width: 100%; max-width: 280px; }
    #login .logo { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
    #login .logo div { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
    #login .logo p { font-size: 11px; color: #6b7280; margin: 6px 0 0 0; }
    #login input { width: 100%; height: 40px; padding: 0 12px; border-radius: 10px; border: 1px solid #d1d5db;
      background: #f9fafb; font-size: 13px; margin-bottom: 8px; outline: none; }
    #login input:focus { border-color: #111; background: #fff; }
    #login button { width: 100%; height: 40px; border: none; border-radius: 10px; background: #111; color: #fff;
      font-size: 13px; font-weight: 500; cursor: pointer; margin-top: 8px; }
    #login button:disabled { opacity: 0.6; cursor: wait; }
    #login .err { font-size: 11px; color: #b91c1c; margin: 6px 2px 0 2px; min-height: 14px; }

    /* Chat */
    #chat { display: none; flex-direction: column; height: 100vh; }
    #chat.active { display: flex; }
    #chat .header { display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border-bottom: 1px solid #e5e7eb; }
    #chat .header .title { font-size: 13px; font-weight: 600; }
    #chat .header .sub { font-size: 10px; color: #6b7280; }
    #chat .header button { background: none; border: none; cursor: pointer; color: #6b7280; font-size: 11px; padding: 4px 8px; }
    #chat .messages { flex: 1; overflow-y: auto; padding: 12px; }
    #chat .msg { margin-bottom: 10px; max-width: 90%; padding: 8px 12px; border-radius: 12px;
      font-size: 13px; line-height: 1.45; white-space: pre-wrap; word-break: break-word; }
    #chat .msg.user { margin-left: auto; background: #111; color: #fff; border-bottom-right-radius: 4px; }
    #chat .msg.assistant { margin-right: auto; background: #f3f4f6; color: #111; border-bottom-left-radius: 4px; }
    #chat .inputRow { border-top: 1px solid #e5e7eb; padding: 8px; display: flex; gap: 6px; }
    #chat textarea { flex: 1; resize: none; border: 1px solid #d1d5db; border-radius: 10px;
      padding: 8px 10px; font-size: 13px; min-height: 40px; max-height: 120px; outline: none; background: #f9fafb; }
    #chat .send { height: 40px; padding: 0 14px; border: none; border-radius: 10px; background: #111; color: #fff;
      font-size: 12px; font-weight: 500; cursor: pointer; }
    #chat .send:disabled { opacity: 0.5; cursor: wait; }

    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: -2px; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #diag { position: fixed; bottom: 4px; left: 4px; font-size: 9px; color: #9ca3af; }

    /* BGP comp writeback banner — shown only when the workbook has a _BGP_META sheet */
    #bgpBanner { display: none; padding: 8px 10px; background: #f0f9ff; border-bottom: 1px solid #bae6fd;
      font-size: 11px; color: #0c4a6e; flex-direction: column; gap: 4px; }
    #bgpBanner.active { display: flex; }
    #bgpBanner .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    #bgpBanner .label { font-weight: 600; }
    #bgpBanner .sub { color: #075985; font-size: 10px; }
    #bgpBanner button { height: 26px; padding: 0 10px; border: none; border-radius: 6px;
      background: #0369a1; color: #fff; font-size: 11px; font-weight: 500; cursor: pointer; }
    #bgpBanner button:disabled { opacity: 0.6; cursor: wait; }
    #bgpBanner .status { font-size: 10px; margin-top: 2px; min-height: 12px; }
    #bgpBanner .status.ok { color: #047857; }
    #bgpBanner .status.err { color: #b91c1c; }
  </style>
</head>
<body>
  <div id="login">
    <div class="box">
      <div class="logo">
        <div>ChatBGP</div>
        <p>Sign in to get started</p>
      </div>
      <form id="loginForm" autocomplete="on">
        <input id="email" type="text" placeholder="Email" autocomplete="username" autofocus />
        <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
        <div class="err" id="err"></div>
        <button id="submit" type="submit">Sign In</button>
      </form>
    </div>
  </div>

  <div id="chat">
    <div class="header">
      <div>
        <div class="title">ChatBGP</div>
        <div class="sub" id="userLabel">Claude Sonnet</div>
      </div>
      <button id="logoutBtn">Sign out</button>
    </div>
    <div id="bgpBanner">
      <div class="row">
        <div>
          <div class="label">BGP comp linked</div>
          <div class="sub" id="bgpBannerSub">—</div>
        </div>
        <button id="bgpPushBtn">Push to comp</button>
      </div>
      <div class="status" id="bgpStatus"></div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="inputRow">
      <textarea id="input" placeholder="Ask anything about this workbook…" rows="1"></textarea>
      <button class="send" id="sendBtn">Send</button>
    </div>
  </div>

  <div id="diag"></div>

  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" async></script>
  <script>
    (function() {
      var TOKEN_KEY = "bgp_addin_token";
      var USER_KEY = "bgp_addin_user";
      var diag = document.getElementById("diag");
      try { diag.textContent = "v1 · " + new Date().toISOString().slice(11, 19); } catch (e) {}

      var loginEl = document.getElementById("login");
      var chatEl = document.getElementById("chat");
      var errEl = document.getElementById("err");
      var submitBtn = document.getElementById("submit");
      var form = document.getElementById("loginForm");
      var emailEl = document.getElementById("email");
      var passwordEl = document.getElementById("password");
      var userLabel = document.getElementById("userLabel");
      var logoutBtn = document.getElementById("logoutBtn");
      var messagesEl = document.getElementById("messages");
      var inputEl = document.getElementById("input");
      var sendBtn = document.getElementById("sendBtn");

      function getToken() { try { return localStorage.getItem(TOKEN_KEY); } catch (e) { return null; } }
      function setToken(t) { try { localStorage.setItem(TOKEN_KEY, t); } catch (e) {} }
      function clearToken() { try { localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(USER_KEY); } catch (e) {} }
      function getUser() { try { return localStorage.getItem(USER_KEY) || ""; } catch (e) { return ""; } }
      function setUser(n) { try { localStorage.setItem(USER_KEY, n); } catch (e) {} }

      function showChat() {
        loginEl.style.display = "none";
        chatEl.classList.add("active");
        var n = getUser();
        if (n) userLabel.textContent = "Signed in as " + n;
        if (messagesEl.children.length === 0) {
          addMessage("assistant", "Hi! I'm ChatBGP. Ask me anything about your workbook, BGP's CRM, or Excel formulas.");
        }
        setTimeout(function() { inputEl.focus(); }, 100);
        try { refreshBgpBanner(); } catch (e) {}
      }
      function showLogin() {
        loginEl.style.display = "flex";
        chatEl.classList.remove("active");
      }

      function addMessage(role, text) {
        var div = document.createElement("div");
        div.className = "msg " + role;
        div.textContent = text;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return div;
      }

      form.addEventListener("submit", function(e) {
        e.preventDefault();
        var email = emailEl.value.trim();
        var password = passwordEl.value;
        if (!email || !password) return;
        errEl.textContent = "";
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span>Signing in…';

        fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: email, password: password })
        }).then(function(r) {
          return r.json().then(function(data) {
            if (!r.ok) throw new Error(data.message || "Login failed");
            return data;
          });
        }).then(function(data) {
          if (!data.token) throw new Error("No token received");
          setToken(data.token);
          setUser(data.name || data.username || email);
          showChat();
        }).catch(function(err) {
          errEl.textContent = err.message || "Login failed";
        }).then(function() {
          submitBtn.disabled = false;
          submitBtn.textContent = "Sign In";
        });
      });

      logoutBtn.addEventListener("click", function() {
        var t = getToken();
        if (t) {
          fetch("/api/auth/logout", { method: "POST", headers: { "Authorization": "Bearer " + t } }).catch(function() {});
        }
        clearToken();
        messagesEl.innerHTML = "";
        showLogin();
      });

      async function readWorkbookContext() {
        if (!window.Excel) return "";
        try {
          return await Excel.run(async function(ctx) {
            var wb = ctx.workbook;
            wb.load("name");
            var sheets = wb.worksheets;
            sheets.load("items/name");
            await ctx.sync();
            var out = "File: " + (wb.name || "Untitled") + "\nSheets: ";
            out += sheets.items.map(function(s) { return s.name; }).join(", ");
            try {
              var range = wb.getSelectedRange();
              range.load(["address", "values"]);
              await ctx.sync();
              out += "\nSelection: " + range.address;
              if (range.values && range.values.length) {
                var flat = range.values.slice(0, 20).map(function(row) { return row.join("\t"); }).join("\n");
                out += "\nValues:\n" + flat;
              }
            } catch (e) {}
            return out;
          });
        } catch (e) { return ""; }
      }

      // ── BGP comp write-back ──────────────────────────────────────────
      // When a workbook was exported from the BGP Rent Analysis dialog it carries a
      // hidden `_BGP_META` sheet recording the comp id + the cells each CRM field
      // maps to. We surface a banner and a one-click push-back button when present.

      var bgpBanner    = document.getElementById("bgpBanner");
      var bgpBannerSub = document.getElementById("bgpBannerSub");
      var bgpPushBtn   = document.getElementById("bgpPushBtn");
      var bgpStatus    = document.getElementById("bgpStatus");
      var bgpState     = null;

      async function readBgpMeta() {
        if (!window.Excel) return null;
        try {
          return await Excel.run(async function(ctx) {
            var sheet = ctx.workbook.worksheets.getItemOrNullObject("_BGP_META");
            sheet.load("name");
            await ctx.sync();
            if (sheet.isNullObject) return null;
            var range = sheet.getUsedRange();
            range.load("values");
            await ctx.sync();
            var rows = range.values || [];
            var meta = { snapshot: {}, writeback: {} };
            rows.forEach(function(r) {
              if (!r || r.length < 2) return;
              var k = String(r[0] || "");
              var v = r[1];
              if (!k || k === "key") return;
              if (k.indexOf("snapshot:") === 0) meta.snapshot[k.slice(9)] = v;
              else if (k.indexOf("writeback:") === 0) meta.writeback[k.slice(10)] = String(v || "");
              else meta[k] = v;
            });
            return meta;
          });
        } catch (e) { return null; }
      }

      async function resolveWritebackValues(writeback) {
        return Excel.run(async function(ctx) {
          var entries = Object.keys(writeback);
          var ranges = entries.map(function(field) {
            var ref = writeback[field];
            var parts = ref.split("!");
            if (parts.length !== 2) return null;
            var sheetName = parts[0].replace(/^'/, "").replace(/'$/, "");
            var addr = parts[1].replace(/\$/g, "");
            try {
              return { field: field, range: ctx.workbook.worksheets.getItem(sheetName).getRange(addr) };
            } catch (e) { return null; }
          }).filter(Boolean);
          ranges.forEach(function(r) { r.range.load("values"); });
          await ctx.sync();
          var out = {};
          ranges.forEach(function(r) {
            var v = r.range.values && r.range.values[0] ? r.range.values[0][0] : null;
            if (v !== null && v !== "" && typeof v !== "undefined") out[r.field] = v;
          });
          return out;
        });
      }

      async function refreshBgpBanner() {
        var meta = await readBgpMeta();
        bgpState = meta && meta.bgpCompId ? meta : null;
        if (!bgpState) {
          bgpBanner.classList.remove("active");
          return;
        }
        var kind = bgpState.bgpKind || "analysis";
        var label = (kind === "ner" ? "NER" : kind === "gia" ? "GIA" : kind === "itza" ? "ITZA" : kind) + " · " + (bgpState.snapshot.address || "Comp " + String(bgpState.bgpCompId).slice(0, 8));
        bgpBannerSub.textContent = label;
        bgpStatus.textContent = "";
        bgpStatus.className = "status";
        bgpBanner.classList.add("active");
      }

      async function pushBgpWriteback() {
        if (!bgpState || !bgpState.bgpCompId) return;
        var token = getToken();
        if (!token) { showLogin(); return; }
        bgpPushBtn.disabled = true;
        bgpStatus.className = "status";
        bgpStatus.textContent = "Reading cells…";
        try {
          var values = await resolveWritebackValues(bgpState.writeback || {});
          // Normalise numbers to strings so they match the CRM's text columns.
          var payload = {};
          Object.keys(values).forEach(function(k) {
            var v = values[k];
            if (typeof v === "number") payload[k] = String(Math.round(v * 100) / 100);
            else payload[k] = String(v);
          });
          if (Object.keys(payload).length === 0) {
            bgpStatus.className = "status err";
            bgpStatus.textContent = "No writeback cells resolved. Sheet layout may have changed.";
            return;
          }
          bgpStatus.textContent = "Pushing " + Object.keys(payload).length + " field(s)…";
          var base = bgpState.bgpApiBase || "";
          var r = await fetch(base + "/api/crm/comps/" + encodeURIComponent(bgpState.bgpCompId), {
            method: "PUT",
            headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
            body: JSON.stringify(payload),
          });
          if (r.status === 401) { clearToken(); showLogin(); return; }
          if (!r.ok) throw new Error("Server error (" + r.status + ")");
          bgpStatus.className = "status ok";
          bgpStatus.textContent = "Updated: " + Object.keys(payload).join(", ");
        } catch (err) {
          bgpStatus.className = "status err";
          bgpStatus.textContent = "Push failed: " + (err.message || "unknown");
        } finally {
          bgpPushBtn.disabled = false;
        }
      }

      if (bgpPushBtn) bgpPushBtn.addEventListener("click", pushBgpWriteback);

      if (window.Office && Office.onReady) {
        Office.onReady().then(function() {
          refreshBgpBanner();
          try {
            // Re-check when the active workbook or sheet changes.
            Excel.run(async function(ctx) {
              ctx.workbook.onActivated.add(refreshBgpBanner);
              await ctx.sync();
            }).catch(function() {});
          } catch (e) {}
        });
      }

      var conversation = [];
      var sending = false;

      sendBtn.addEventListener("click", send);
      inputEl.addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      });
      inputEl.addEventListener("input", function() {
        inputEl.style.height = "auto";
        inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
      });

      function send() {
        if (sending) return;
        var text = inputEl.value.trim();
        if (!text) return;
        var token = getToken();
        if (!token) { showLogin(); return; }

        addMessage("user", text);
        conversation.push({ role: "user", content: text });
        inputEl.value = "";
        inputEl.style.height = "auto";
        sending = true;
        sendBtn.disabled = true;
        var pending = addMessage("assistant", "…");

        readWorkbookContext().then(function(ctx) {
          return fetch("/api/chatbgp/excel-chat", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
            body: JSON.stringify({ messages: conversation, excelContext: ctx || undefined })
          });
        }).then(function(r) {
          if (r.status === 401) {
            clearToken();
            pending.remove();
            showLogin();
            throw new Error("Session expired");
          }
          if (!r.ok) throw new Error("Server error (" + r.status + ")");
          return r.body.getReader();
        }).then(function(reader) {
          var decoder = new TextDecoder();
          var buffer = "";
          var reply = "";
          function pump() {
            return reader.read().then(function(res) {
              if (res.done) return reply;
              buffer += decoder.decode(res.value, { stream: true });
              var lines = buffer.split("\n");
              buffer = lines.pop() || "";
              for (var i = 0; i < lines.length; i++) {
                if (lines[i].indexOf("data: ") === 0) {
                  try {
                    var d = JSON.parse(lines[i].slice(6));
                    if (d.reply) reply = d.reply;
                  } catch (e) {}
                }
              }
              return pump();
            });
          }
          return pump();
        }).then(function(reply) {
          if (reply) {
            pending.textContent = reply;
            conversation.push({ role: "assistant", content: reply });
          } else {
            pending.textContent = "(no response)";
          }
        }).catch(function(err) {
          pending.textContent = "Sorry — " + (err.message || "request failed");
        }).then(function() {
          sending = false;
          sendBtn.disabled = false;
        });
      }

      // Clear any stale service worker registrations / caches on this page.
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister().catch(function(){}); });
        }).catch(function(){});
        if (window.caches && caches.keys) {
          caches.keys().then(function(keys) {
            keys.forEach(function(k) { caches.delete(k).catch(function(){}); });
          }).catch(function(){});
        }
      }

      // Decide which view to show based on stored token
      if (getToken()) showChat(); else showLogin();
    })();
  </script>
</body>
</html>
