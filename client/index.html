<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>BGP Dashboard | Bruce Gillingham Pollard</title>
    <meta name="description" content="Property management dashboard for Bruce Gillingham Pollard" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/apple-touch-icon-120.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BGP" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/tiempos-text-vf-roman.woff2" crossorigin>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if (window.location.pathname.startsWith('/addin/')) {
        var s = document.createElement('script');
        s.src = 'https://appsforoffice.microsoft.com/lib/1/hosted/office.js';
        s.async = true;
        document.head.appendChild(s);
      }
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        var refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).then(function(reg) {
            reg.update();
            setInterval(function() { reg.update(); }, 60000);
            if (reg.waiting) {
              reg.waiting.postMessage('skipWaiting');
            }
            reg.addEventListener('updatefound', function() {
              var newSw = reg.installing;
              if (newSw) {
                newSw.addEventListener('statechange', function() {
                  if (newSw.state === 'installed' && navigator.serviceWorker.controller) {
                    newSw.postMessage('skipWaiting');
                  }
                });
              }
            });
          }).catch(function() {});
        });
      }
    </script>
  </body>
</html>
