<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>BGP Dashboard | Bruce Gillingham Pollard</title>
    <meta name="description" content="Property management dashboard for Bruce Gillingham Pollard" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/apple-touch-icon-120.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BGP" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/tiempos-text-vf-roman.woff2" crossorigin>
  </head>
  <body>
    <div id="root">
      <!-- Visible fallback while the JS bundle boots. If the bundle fails to
           load (e.g. inside an Office task pane webview), this stays on screen
           and the diagnostic script below surfaces any error. -->
      <div id="boot-fallback" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 24px; color: #111; min-height: 100vh; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: #fff;">
        <div style="font-size: 13px; font-weight: 600; letter-spacing: 0.02em; margin-bottom: 8px;">BGP Dashboard</div>
        <div style="font-size: 11px; color: #666;">Loading…</div>
        <div id="boot-error" style="font-size: 10px; color: #b91c1c; margin-top: 16px; max-width: 260px; white-space: pre-wrap; word-break: break-word;"></div>
      </div>
    </div>
    <script>
      // Surface any script errors to the boot fallback so Office task panes
      // (which have no visible console) can still show what went wrong.
      window.addEventListener('error', function(e) {
        var el = document.getElementById('boot-error');
        if (el) el.textContent = 'Error: ' + (e.message || 'unknown') + (e.filename ? '\n' + e.filename : '');
      });
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('boot-error');
        if (el) el.textContent = 'Promise rejection: ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason));
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if (window.location.pathname.startsWith('/addin/')) {
        var s = document.createElement('script');
        s.src = 'https://appsforoffice.microsoft.com/lib/1/hosted/office.js';
        s.async = true;
        document.head.appendChild(s);
      }
    </script>
    <script>
      // Service worker interferes with Office Add-ins (they run in an embedded
      // webview that can't reach an offline cache). On /addin/ paths, actively
      // unregister any previously installed SW and wipe its caches so stale
      // bundles can't serve the task pane.
      if ('serviceWorker' in navigator && window.location.pathname.startsWith('/addin/')) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(reg) { reg.unregister().catch(function(){}); });
        }).catch(function(){});
        if (window.caches && caches.keys) {
          caches.keys().then(function(keys) {
            keys.forEach(function(k) { caches.delete(k).catch(function(){}); });
          }).catch(function(){});
        }
      }
      if ('serviceWorker' in navigator && !window.location.pathname.startsWith('/addin/')) {
        var refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).then(function(reg) {
            reg.update();
            setInterval(function() { reg.update(); }, 60000);
            if (reg.waiting) {
              reg.waiting.postMessage('skipWaiting');
            }
            reg.addEventListener('updatefound', function() {
              var newSw = reg.installing;
              if (newSw) {
                newSw.addEventListener('statechange', function() {
                  if (newSw.state === 'installed' && navigator.serviceWorker.controller) {
                    newSw.postMessage('skipWaiting');
                  }
                });
              }
            });
          }).catch(function() {});
        });
      }
    </script>
  </body>
</html>
